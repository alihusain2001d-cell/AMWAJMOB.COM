<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>نظام الحضور - أمواج</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f6f9;
    --surface: #ffffff;
    --surface2: #f0f2f5;
    --border: #e0e4ea;
    --accent: #0096c7;
    --accent2: #0077b6;
    --green: #2da44e;
    --red: #d1242f;
    --text: #1a1f2e;
    --text2: #656d76;
    --radius: 12px;
  }
  * { margin:0; padding:0; box-sizing:border-box; touch-action:manipulation; }
  body { font-family:'Cairo',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  .header {
    background:var(--surface); border-bottom:1px solid var(--border);
    padding:0 20px; display:flex; align-items:center; justify-content:space-between;
    height:60px; position:sticky; top:0; z-index:100;
  }
  .logo { display:flex; align-items:center; gap:10px; font-size:18px; font-weight:900; color:var(--accent); }
  .logo-icon { width:36px; height:36px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:18px; }
  .status-badge { display:flex; align-items:center; gap:7px; padding:5px 12px; border-radius:20px; border:1px solid var(--border); font-size:12px; color:var(--text2); cursor:pointer; }
  .status-dot { width:7px; height:7px; border-radius:50%; background:var(--red); }
  .status-dot.on { background:var(--green); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  .container { display:flex; min-height:calc(100vh - 60px); }
  .sidebar { width:210px; background:var(--surface); border-left:1px solid var(--border); padding:16px 0; flex-shrink:0; }
  .nav-item { display:flex; align-items:center; gap:10px; padding:11px 18px; cursor:pointer; transition:all .2s; color:var(--text2); font-size:14px; font-weight:600; border-right:3px solid transparent; }
  .nav-item:hover { background:var(--surface2); color:var(--text); }
  .nav-item.active { background:var(--surface2); color:var(--accent); border-right-color:var(--accent); }

  .content { flex:1; padding:24px; overflow-x:hidden; padding-bottom:80px; }
  .page { display:none; }
  .page.active { display:block; }

  .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:10px; }
  .page-title { font-size:20px; font-weight:900; }
  .page-subtitle { color:var(--text2); font-size:12px; margin-top:2px; }

  .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:20px; }
  .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; }
  .stat-label { color:var(--text2); font-size:11px; font-weight:700; text-transform:uppercase; }
  .stat-value { font-size:28px; font-weight:900; margin-top:4px; }
  .stat-value.blue { color:var(--accent); }
  .stat-value.green { color:var(--green); }
  .stat-value.red { color:var(--red); }

  .sync-info { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:12px 16px; margin-bottom:16px; display:flex; align-items:center; gap:10px; font-size:13px; color:var(--text2); }

  .table-wrap { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
  .table-header { padding:14px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
  .search-box { display:flex; align-items:center; gap:8px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:7px 12px; flex:1; max-width:280px; }
  .search-box input { background:none; border:none; outline:none; color:var(--text); font-family:'Cairo',sans-serif; font-size:13px; width:100%; text-align:right; }
  table { width:100%; border-collapse:collapse; }
  th { padding:11px 14px; text-align:right; font-size:11px; font-weight:700; color:var(--text2); background:var(--surface2); border-bottom:1px solid var(--border); text-transform:uppercase; }
  td { padding:12px 14px; font-size:13px; border-bottom:1px solid var(--border); vertical-align:middle; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:var(--surface2); }

  .badge { display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:700; }
  .badge.in { background:rgba(45,164,78,.12); color:var(--green); }
  .badge.out { background:rgba(209,36,47,.12); color:var(--red); }
  .badge.user { background:rgba(101,109,118,.12); color:var(--text2); }

  .btn { display:inline-flex; align-items:center; gap:6px; padding:8px 14px; border-radius:8px; border:none; cursor:pointer; font-family:'Cairo',sans-serif; font-size:13px; font-weight:700; transition:all .2s; }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { background:var(--accent2); }
  .btn-secondary { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
  .btn-secondary:hover { border-color:var(--accent); color:var(--accent); }
  .btn-danger { background:rgba(209,36,47,.1); color:var(--red); border:1px solid rgba(209,36,47,.2); }
  .btn-danger:hover { background:var(--red); color:#fff; }
  .btn-sm { padding:5px 9px; font-size:12px; }

  .date-filter { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:12px 16px; margin-bottom:16px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .date-filter label { font-size:13px; color:var(--text2); font-weight:600; }
  .date-filter input[type=date] { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:6px 10px; color:var(--text); font-family:'Cairo',sans-serif; font-size:13px; outline:none; }

  .filter-bar { display:flex; gap:6px; flex-wrap:wrap; }
  .filter-btn { padding:5px 12px; border-radius:20px; border:1px solid var(--border); background:transparent; color:var(--text2); font-family:'Cairo',sans-serif; font-size:12px; font-weight:700; cursor:pointer; transition:all .2s; }
  .filter-btn.active, .filter-btn:hover { border-color:var(--accent); color:var(--accent); background:rgba(0,150,199,.08); }

  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); display:flex; align-items:center; justify-content:center; z-index:999; opacity:0; pointer-events:none; transition:opacity .2s; }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:24px; width:420px; max-width:95vw; transform:translateY(20px); transition:transform .2s; }
  .modal-overlay.open .modal { transform:translateY(0); }
  .modal-title { font-size:17px; font-weight:900; margin-bottom:18px; }
  .form-group { margin-bottom:14px; }
  .form-label { display:block; font-size:11px; font-weight:700; color:var(--text2); margin-bottom:5px; text-transform:uppercase; }
  .form-input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:9px 12px; color:var(--text); font-family:'Cairo',sans-serif; font-size:14px; outline:none; transition:border-color .2s; text-align:right; }
  .form-input:focus { border-color:var(--accent); }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:20px; }

  .empty { text-align:center; padding:50px 20px; color:var(--text2); }
  .empty-icon { font-size:44px; margin-bottom:10px; }
  .loading { display:flex; align-items:center; justify-content:center; padding:50px; gap:10px; color:var(--text2); }
  .spinner { width:22px; height:22px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }

  .avatar { width:32px; height:32px; background:linear-gradient(135deg,var(--accent),#0077b6); border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:13px; font-weight:900; color:#fff; flex-shrink:0; }

  .mobile-nav { display:none; position:fixed; bottom:0; left:0; right:0; background:var(--surface); border-top:1px solid var(--border); padding:6px 0; z-index:200; justify-content:space-around; }
  .mobile-nav-item { display:flex; flex-direction:column; align-items:center; gap:2px; padding:5px 18px; cursor:pointer; color:var(--text2); font-size:10px; font-weight:700; border-radius:10px; transition:all .2s; }
  .mobile-nav-item.active { color:var(--accent); }
  .mobile-nav-item span:first-child { font-size:20px; }

  .toast-container { position:fixed; bottom:70px; left:50%; transform:translateX(-50%); z-index:9999; display:flex; flex-direction:column; gap:6px; align-items:center; }
  .toast { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px 18px; font-size:13px; font-weight:600; display:flex; align-items:center; gap:7px; animation:slideUp .3s ease; min-width:180px; justify-content:center; box-shadow:0 4px 12px rgba(0,0,0,.1); }
  .toast.success { border-color:var(--green); color:var(--green); }
  .toast.error { border-color:var(--red); color:var(--red); }
  @keyframes slideUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  @media(max-width:768px) {
    .sidebar { display:none; }
    .mobile-nav { display:flex; }
    .content { padding:14px; padding-bottom:75px; }
    .stats { grid-template-columns:1fr 1fr; }
    th,td { padding:9px 8px; font-size:12px; }
    .page-header { flex-wrap:wrap; }
    .form-row { grid-template-columns:1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo"><div class="logo-icon">🌊</div>أمواج — البصمة</div>
  <div class="status-badge" onclick="checkStatus()">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">جاري التحقق...</span>
  </div>
</div>

<div class="container">
  <div class="sidebar">
    <div class="nav-item active" onclick="showPage('attendance',this)"><span>📋</span> الحضور والانصراف</div>
    <div class="nav-item" onclick="showPage('employees',this)"><span>👥</span> الموظفين</div>
  </div>

  <div class="content">

    <!-- صفحة الحضور -->
    <div class="page active" id="page-attendance">
      <div class="page-header">
        <div><div class="page-title">سجل الحضور والانصراف</div><div class="page-subtitle">مزامنة تلقائية كل 5 دقائق</div></div>
        <button class="btn btn-primary" onclick="loadAttendance()">🔄 تحديث</button>
      </div>

      <div class="sync-info" id="syncInfo">⏱ آخر مزامنة: جاري التحميل...</div>

      <div class="stats">
        <div class="stat-card"><div class="stat-label">إجمالي</div><div class="stat-value blue" id="statTotal">—</div></div>
        <div class="stat-card"><div class="stat-label">دخول</div><div class="stat-value green" id="statIn">—</div></div>
        <div class="stat-card"><div class="stat-label">خروج</div><div class="stat-value red" id="statOut">—</div></div>
        <div class="stat-card"><div class="stat-label">اليوم</div><div class="stat-value blue" id="statToday">—</div></div>
      </div>

      <div class="date-filter">
        <label>من:</label><input type="date" id="dateFrom" onchange="filterAttendance()">
        <label>إلى:</label><input type="date" id="dateTo" onchange="filterAttendance()">
        <button class="btn btn-secondary btn-sm" onclick="clearDateFilter()">الكل</button>
        <button class="btn btn-secondary btn-sm" onclick="setToday()">اليوم</button>
      </div>

      <div class="table-wrap">
        <div class="table-header">
          <div class="search-box"><span>🔍</span><input type="text" placeholder="ابحث..." id="attSearch" oninput="filterAttendance()"></div>
          <div class="filter-bar">
            <button class="filter-btn active" id="filterAll" onclick="setFilter('all')">الكل</button>
            <button class="filter-btn" id="filterIn" onclick="setFilter('in')">دخول</button>
            <button class="filter-btn" id="filterOut" onclick="setFilter('out')">خروج</button>
          </div>
        </div>
        <div id="attendanceBody"><div class="loading"><div class="spinner"></div> جاري التحميل...</div></div>
      </div>
    </div>

    <!-- صفحة الموظفين -->
    <div class="page" id="page-employees">
      <div class="page-header">
        <div><div class="page-title">إدارة الموظفين</div><div class="page-subtitle">عرض الموظفين</div></div>
        <button class="btn btn-secondary" onclick="loadEmployees()">🔄 تحديث</button>
      </div>
      <div class="table-wrap">
        <div class="table-header">
          <div class="search-box"><span>🔍</span><input type="text" placeholder="ابحث..." id="empSearch" oninput="filterEmployees()"></div>
          <span id="empCount" style="color:var(--text2);font-size:13px"></span>
        </div>
        <div id="employeesBody"><div class="loading"><div class="spinner"></div> جاري التحميل...</div></div>
      </div>
    </div>

  </div>
</div>

<div class="mobile-nav">
  <div class="mobile-nav-item active" id="mnav-attendance" onclick="showPage('attendance',document.querySelectorAll('.nav-item')[0]);setMNav('attendance')"><span>📋</span><span>الحضور</span></div>
  <div class="mobile-nav-item" id="mnav-employees" onclick="showPage('employees',document.querySelectorAll('.nav-item')[1]);setMNav('employees')"><span>👥</span><span>الموظفين</span></div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
const GAS = 'https://script.google.com/macros/s/AKfycbwnkxjfkooIpZ2c-Qi8ez-n2QqYpFBFE7SCPrmkzuob0XlM1AqujTosg_7MQqwv4MHBrQ/exec';

let allAttendance = [], allEmployees = [], currentFilter = 'all';

function setMNav(n) {
  document.querySelectorAll('.mobile-nav-item').forEach(i=>i.classList.remove('active'));
  document.getElementById('mnav-'+n).classList.add('active');
}

function showPage(name, el) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if(el) el.classList.add('active');
  if(name==='employees') loadEmployees();
}

async function gasGet(action) {
  const r = await fetch(`${GAS}?action=${action}`);
  return r.json();
}

async function checkStatus() {
  try {
    const d = await gasGet('status');
    if(d.success) {
      document.getElementById('statusDot').classList.add('on');
      document.getElementById('statusText').textContent = 'متصل';
    }
  } catch(e) {
    document.getElementById('statusText').textContent = 'غير متصل';
  }
}

async function loadAttendance() {
  document.getElementById('attendanceBody').innerHTML = '<div class="loading"><div class="spinner"></div> جاري التحميل...</div>';
  try {
    const d = await gasGet('attendance');
    if(!d.success) throw new Error(d.message);
    allAttendance = d.data.sort((a,b) => new Date(b.attTime)-new Date(a.attTime));
    updateStats();
    filterAttendance();
    document.getElementById('syncInfo').textContent = '⏱ آخر تحديث: ' + new Date().toLocaleTimeString('ar-IQ');
    toast('تم تحميل '+allAttendance.length+' سجل ✓','success');
  } catch(e) {
    document.getElementById('attendanceBody').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">${e.message}</div></div>`;
    toast('فشل: '+e.message,'error');
  }
}

function updateStats() {
  const today = new Date().toDateString();
  const ins = allAttendance.filter(r=>r.type==0||r.type=='0');
  const outs = allAttendance.filter(r=>r.type==4||r.type=='4');
  const todayIds = new Set(allAttendance.filter(r=>new Date(r.attTime).toDateString()===today).map(r=>r.userId));
  document.getElementById('statTotal').textContent = allAttendance.length;
  document.getElementById('statIn').textContent = ins.length;
  document.getElementById('statOut').textContent = outs.length;
  document.getElementById('statToday').textContent = todayIds.size;
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('filter'+f.charAt(0).toUpperCase()+f.slice(1)).classList.add('active');
  filterAttendance();
}

function setToday() {
  const t = new Date().toISOString().split('T')[0];
  document.getElementById('dateFrom').value = t;
  document.getElementById('dateTo').value = t;
  filterAttendance();
}

function clearDateFilter() {
  document.getElementById('dateFrom').value = '';
  document.getElementById('dateTo').value = '';
  filterAttendance();
}

function parseDate(v) {
  if(!v) return null;
  const d = new Date(v);
  if(!isNaN(d)) return d;
  return new Date(String(v).replace(' ','T'));
}

function filterAttendance() {
  const search = document.getElementById('attSearch').value.toLowerCase();
  const from = document.getElementById('dateFrom').value;
  const to = document.getElementById('dateTo').value;
  let data = allAttendance.filter(r => {
    const ms = !search||(r.userId+'').toLowerCase().includes(search)||(r.userName||'').toLowerCase().includes(search);
    const d = parseDate(r.attTime);
    const ds = d ? d.toISOString().split('T')[0] : '';
    const mf = !from||ds>=from, mt = !to||ds<=to;
    const mt2 = currentFilter==='all'?true:currentFilter==='in'?(r.type==0||r.type=='0'):(r.type==4||r.type=='4');
    return ms&&mf&&mt&&mt2;
  });
  if(!data.length) { document.getElementById('attendanceBody').innerHTML='<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">لا توجد سجلات</div></div>'; return; }
  const rows = data.map(r => {
    const dt = parseDate(r.attTime);
    const isIn = r.type==0||r.type=='0';
    return `<tr>
      <td><div class="avatar">${(r.userName||r.userId||'?').charAt(0)}</div></td>
      <td><strong>${r.userName||'—'}</strong></td>
      <td style="color:var(--text2)">${r.userId}</td>
      <td>${dt?dt.toLocaleDateString('ar-IQ'):r.attTime}</td>
      <td>${dt?dt.toLocaleTimeString('ar-IQ',{hour:'2-digit',minute:'2-digit'}):''}</td>
      <td><span class="badge ${isIn?'in':'out'}">${isIn?'↗ دخول':'↙ خروج'}</span></td>
    </tr>`;
  }).join('');
  document.getElementById('attendanceBody').innerHTML = `<table><thead><tr><th></th><th>الاسم</th><th>رقم الموظف</th><th>التاريخ</th><th>الوقت</th><th>النوع</th></tr></thead><tbody>${rows}</tbody></table>`;
}

async function loadEmployees() {
  document.getElementById('employeesBody').innerHTML = '<div class="loading"><div class="spinner"></div> جاري التحميل...</div>';
  try {
    const d = await gasGet('users');
    if(!d.success) throw new Error(d.message);
    allEmployees = d.data;
    document.getElementById('empCount').textContent = allEmployees.length+' موظف';
    renderEmployees(allEmployees);
  } catch(e) {
    document.getElementById('employeesBody').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">${e.message}</div></div>`;
  }
}

function filterEmployees() {
  const s = document.getElementById('empSearch').value.toLowerCase();
  renderEmployees(allEmployees.filter(e=>(e.name||'').toLowerCase().includes(s)||(e.userId+'').toLowerCase().includes(s)));
}

function renderEmployees(list) {
  if(!list.length) { document.getElementById('employeesBody').innerHTML='<div class="empty"><div class="empty-icon">👤</div><div class="empty-text">لا يوجد موظفين</div></div>'; return; }
  const rows = list.map(e=>`<tr>
    <td><div class="avatar">${(e.name||'?').charAt(0)}</div></td>
    <td><strong>${e.name||'—'}</strong></td>
    <td style="color:var(--text2)">${e.userId}</td>
    <td style="color:var(--text2)">${e.department||'—'}</td>
  </tr>`).join('');
  document.getElementById('employeesBody').innerHTML = `<table><thead><tr><th></th><th>الاسم</th><th>رقم الموظف</th><th>القسم</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function toast(msg, type='success') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(()=>t.remove(), 3000);
}

// تشغيل أولي
checkStatus();
loadAttendance();
</script>
</body>
</html>
