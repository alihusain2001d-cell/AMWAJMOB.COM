<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مساعد أمواج</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f4f8; }

  /* زر الشات */
  #chat-btn {
    position: fixed; bottom: 24px; left: 24px;
    width: 60px; height: 60px; border-radius: 50%;
    background: linear-gradient(135deg, #0ea5e9, #0284c7);
    border: none; cursor: pointer; box-shadow: 0 4px 20px rgba(14,165,233,0.4);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; z-index: 9999; transition: transform 0.2s;
  }
  #chat-btn:hover { transform: scale(1.1); }

  /* نافذة الشات */
  #chat-window {
    position: fixed; bottom: 100px; left: 24px;
    width: 360px; height: 520px;
    background: #fff; border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    display: flex; flex-direction: column;
    z-index: 9998; overflow: hidden;
    transform: scale(0); transform-origin: bottom left;
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }
  #chat-window.open { transform: scale(1); }

  /* Header */
  .chat-header {
    background: linear-gradient(135deg, #0ea5e9, #0284c7);
    padding: 16px 20px; color: white;
    display: flex; align-items: center; gap: 12px;
  }
  .chat-avatar { font-size: 28px; }
  .chat-header-info h3 { font-size: 15px; font-weight: 700; }
  .chat-header-info p { font-size: 12px; opacity: 0.85; }
  .online-dot {
    width: 8px; height: 8px; background: #4ade80;
    border-radius: 50%; margin-right: auto;
    box-shadow: 0 0 6px #4ade80;
  }

  /* Messages */
  #messages {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
    background: #f8fafc;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

  .msg { display: flex; gap: 8px; max-width: 85%; }
  .msg.user { align-self: flex-start; flex-direction: row-reverse; }
  .msg.bot  { align-self: flex-end; }

  .msg-bubble {
    padding: 10px 14px; border-radius: 16px;
    font-size: 13.5px; line-height: 1.6;
    word-break: break-word;
  }
  .msg.user .msg-bubble {
    background: linear-gradient(135deg, #0ea5e9, #0284c7);
    color: white; border-bottom-right-radius: 4px;
  }
  .msg.bot .msg-bubble {
    background: white; color: #1e293b;
    border: 1px solid #e2e8f0;
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }
  .msg-icon { font-size: 22px; flex-shrink: 0; margin-top: 2px; }

  /* Typing */
  .typing .msg-bubble {
    display: flex; gap: 5px; align-items: center;
    padding: 12px 16px;
  }
  .dot {
    width: 7px; height: 7px; background: #94a3b8;
    border-radius: 50%; animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }

  /* اقتراحات */
  #suggestions {
    padding: 8px 12px; display: flex; gap: 8px;
    flex-wrap: wrap; border-top: 1px solid #f1f5f9;
    background: #fff;
  }
  .suggestion-btn {
    background: #f0f9ff; border: 1px solid #bae6fd;
    color: #0284c7; border-radius: 20px;
    padding: 5px 12px; font-size: 12px; cursor: pointer;
    font-family: inherit; transition: all 0.2s;
  }
  .suggestion-btn:hover { background: #0ea5e9; color: white; border-color: #0ea5e9; }

  /* Input */
  .chat-input {
    padding: 12px 16px; background: white;
    border-top: 1px solid #e2e8f0;
    display: flex; gap: 8px; align-items: center;
  }
  #user-input {
    flex: 1; border: 1px solid #e2e8f0; border-radius: 24px;
    padding: 10px 16px; font-size: 13.5px; outline: none;
    font-family: inherit; resize: none;
    transition: border-color 0.2s;
  }
  #user-input:focus { border-color: #0ea5e9; }
  #send-btn {
    width: 40px; height: 40px; border-radius: 50%;
    background: linear-gradient(135deg, #0ea5e9, #0284c7);
    border: none; cursor: pointer; color: white;
    font-size: 18px; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0;
    transition: transform 0.15s;
  }
  #send-btn:hover { transform: scale(1.1); }
  #send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
</style>
</head>
<body>

<!-- زر الشات -->
<button id="chat-btn" onclick="toggleChat()">🤖</button>

<!-- نافذة الشات -->
<div id="chat-window">
  <div class="chat-header">
    <div class="chat-avatar">🌊</div>
    <div class="chat-header-info">
      <h3>مساعد أمواج</h3>
      <p>أسعار • صيانة • استفسارات</p>
    </div>
    <div class="online-dot"></div>
  </div>

  <div id="messages"></div>

  <div id="suggestions">
    <button class="suggestion-btn" onclick="sendSuggestion(this)">📱 أسعار شاشات</button>
    <button class="suggestion-btn" onclick="sendSuggestion(this)">🔋 بطاريات متوفرة</button>
    <button class="suggestion-btn" onclick="sendSuggestion(this)">🔧 صيانة الموبايل</button>
  </div>

  <div class="chat-input">
    <input type="text" id="user-input" placeholder="اكتب سؤالك..." onkeydown="if(event.key==='Enter')sendMessage()">
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbygskNyh3AHOMhHg5lBCg0fULGUFBu-xZWyKc1B4OfoRcaWKRJDlSia5VstUPf0RtiX7A/exec';
const API_KEY = 'AMWAJ_d5fb3e7a-6534-4afa-8c52-b3d14b2d6d22';

let isOpen = false;
let isLoading = false;
let chatHistory = [];
let productsCache = null;
let initialized = false;

function toggleChat() {
  isOpen = !isOpen;
  document.getElementById('chat-window').classList.toggle('open', isOpen);
  if (isOpen && !initialized) {
    initialized = true;
    addBotMsg('أهلاً! 👋 أنا مساعد أمواج للإلكترونيات.\n\nأقدر أساعدك في:\n• 💰 استعلام عن الأسعار\n• 🔧 نصائح صيانة الموبايل\n• 📦 توفر المنتجات\n\nشو أقدر أساعدك؟');
    loadProducts();
  }
}

async function loadProducts() {
  try {
    const r = await fetch(API_URL, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({apiKey: API_KEY, action: 'getNewItems'})
    });
    const d = await r.json();
    if (d.success && d.data) productsCache = d.data;
  } catch(e) {}
}

function addBotMsg(text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = '<div class="msg-icon">🤖</div><div class="msg-bubble">' + text.replace(/\n/g,'<br>') + '</div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function addUserMsg(text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = '<div class="msg-bubble">' + text + '</div><div class="msg-icon">👤</div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot typing';
  div.id = 'typing-indicator';
  div.innerHTML = '<div class="msg-icon">🤖</div><div class="msg-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

function sendSuggestion(btn) {
  const text = btn.textContent.replace(/^[^\s]+\s/,'');
  document.getElementById('user-input').value = text;
  sendMessage();
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  addUserMsg(text);
  chatHistory.push({role:'user', content: text});

  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  showTyping();

  try {
    // بناء السياق من المنتجات
    let productContext = '';
    if (productsCache && productsCache.length > 0) {
      const sample = productsCache.slice(0,30).map(p =>
        p.name + (p.price ? ' — ' + Number(p.price).toLocaleString() + ' د.ع' : '') + (p.source ? ' [' + p.source + ']' : '')
      ).join('\n');
      productContext = '\n\nبعض المنتجات المتوفرة حديثاً:\n' + sample;
    }

    const systemPrompt = `أنت مساعد ذكي لمحل أمواج للإلكترونيات في العراق، متخصص ببيع قطع غيار الموبايل بالجملة والمفرد.

مهامك:
1. الإجابة على أسئلة الأسعار والمنتجات المتوفرة
2. تقديم نصائح صيانة الموبايل بشكل مبسط
3. مساعدة الزبائن في اختيار القطع المناسبة

قواعد:
- تكلم بالعربي دائماً (يمكن اللهجة العراقية)
- كن مختصراً ومفيداً
- لو ما عندك معلومة عن سعر محدد قل "تواصل معنا على الرقم 7696"
- للصيانة قدم نصائح عملية مبسطة
${productContext}`;

    const response = await fetch(API_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        apiKey: API_KEY,
        action: 'claudeProxy',
        system: systemPrompt,
        messages: chatHistory
      })
    });

    const data = await response.json();
    hideTyping();

    const reply = data.success && data.reply ? data.reply : 'عذراً، حصل خطأ. حاول مرة ثانية.';
    chatHistory.push({role:'assistant', content: reply});
    addBotMsg(reply);

  } catch(e) {
    hideTyping();
    addBotMsg('عذراً، ما أقدر أتصل بالخادم الآن. تواصل معنا على 7696 📞');
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
}
</script>
</body>
</html>
